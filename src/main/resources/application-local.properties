# Activate with: spring.profiles.active=local (see spring-boot-maven-plugin in pom.xml for mvn spring-boot:run)
# Loads project-root .env automatically (USDA_API_KEY, OPENAI_API_KEY, etc.). File is gitignored; skipped if absent.
spring.config.import=optional:file:.env[.properties]

# Expo Go issues Apple tokens with aud=host.exp.Exponent; production must not use this profile.
apple.client.id.allow-expo-go-audience=true

# Allow POST /users to honor requested role (e.g. ADMIN) for local API testing only. Never enable in production.
app.registration.allow-role-selection=true

# Disable rate limiting during local dev / QA bursts against AI endpoints.
app.rate-limit.enabled=false
