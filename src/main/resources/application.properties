# Server Configuration
server.port=8080
server.address=0.0.0.0
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/healthapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
# validate: Validates schema against entities without making changes
# update: Preserves existing data, only updates schema if needed
# create-drop: Drops and recreates tables on every startup (development only)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# JWT Configuration (HS256 access tokens)
jwt.secret=${JWT_SECRET:your-secret-key-here-make-it-long-and-secure-for-production}
# Access JWT lifetime in seconds (client uses expiresIn for proactive refresh)
jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
# Opaque refresh token storage TTL (days)
jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:30}
# Legacy property (ms) — unused by new token code; kept for backward compatibility
jwt.expiration=86400000

# Logging
logging.level.com.healthapp=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=INFO

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:}
openai.timeout=60
openai.model.voice.default=gpt-4.1-mini
openai.model.voice.food-default=gpt-4.1-mini
openai.model.voice.activity=gpt-4.1-mini
openai.model.voice.cycle=gpt-4.1-mini
openai.model.cycle-sync=gpt-4o-mini
openai.model.voice.food-routing.simple=gpt-4.1-mini
openai.model.voice.food-routing.complex=gpt-4.1
openai.model.voice.food-routing.enabled=true
# AWS profile disables complex routing (application-aws.properties) to control prod cost/latency.
openai.model.voice.max-retries=2
openai.model.voice.temperature=0.1

# Nutrition lookup (USDA hybrid)
nutrition.lookup.enabled=true
nutrition.lookup.provider=usda
nutrition.lookup.usda.api-key=${USDA_API_KEY:}
nutrition.lookup.confidence-threshold=0.75
nutrition.lookup.cache-ttl-days=90

# AI food feature flags
ai.food.show-confidence=true

# Google OAuth Configuration
google.client.id.ios=${GOOGLE_CLIENT_ID_IOS:383964637006-dqtvfhqpickel6ilhrrtc2uv1oljnd3d.apps.googleusercontent.com}
google.client.id.android=${GOOGLE_CLIENT_ID_ANDROID:383964637006-pp6ooio84sr55aro70j1srpjt5909ibh.apps.googleusercontent.com}

# Apple Sign In Configuration (audience for identity token verification)
# Set at least one so the backend can validate the "aud" claim in the Apple JWT.
# - apple.client.id: fallback used when platform-specific ID is not set
# - apple.client.id.ios: your iOS App ID / Bundle ID (e.g. com.yourcompany.healthapp)
# - apple.client.id.android / .web: Services ID from Apple if you use Sign in with Apple on Android/Web
# Get values: developer.apple.com → Certificates, Identifiers & Profiles → Identifiers
apple.client.id=${APPLE_CLIENT_ID:}
apple.client.id.ios=${APPLE_CLIENT_ID_IOS:}
apple.client.id.android=${APPLE_CLIENT_ID_ANDROID:}
apple.client.id.web=${APPLE_CLIENT_ID_WEB:}
# Dev-only option for Expo Go, where Apple token audience is usually "host.exp.Exponent"
apple.client.id.allow-expo-go-audience=${APPLE_ALLOW_EXPO_GO_AUDIENCE:false}
apple.client.id.expo-go.audience=${APPLE_EXPO_GO_AUDIENCE:host.exp.Exponent}
# Optional comma-separated allowlist of extra valid audiences (prefer empty in production)
apple.client.id.allowed-audiences=${APPLE_ALLOWED_AUDIENCES:}
